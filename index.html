<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Junaid Sawer Arain - Orthopedic Surgeon</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/clsx@2.1.1/dist/clsx.min.js"></script>
    <script src="https://unpkg.com/tailwind-merge@2.3.0/dist/bundle.mjs"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .markdown-body h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; }
        .markdown-body h2 { font-size: 1.25em; font-weight: bold; margin-bottom: 0.5em; }
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.75em; }
        
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 3s infinite;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const motion = window.Motion; // Framer Motion

        // --- Constants ---
        const DR_INFO = {
            name: "Dr. Junaid Sawer Arain",
            title: "Consultant Orthopedic & Trauma Surgeon",
            qualifications: ["MBBS", "FCPS (Orthopedics)"],
            pmdc: "PMDC Verified: 12345-S",
            specialties: [
                "Joint Replacement (Knee & Hip)",
                "Arthroscopic Surgery",
                "Complex Trauma & Fractures",
                "Spine Surgery",
                "Sports Injuries"
            ],
            hospitals: [
                {
                    name: "Aga Khan University Hospital",
                    location: "Stadium Road, Karachi",
                    timings: "Mon - Wed: 2:00 PM - 5:00 PM"
                },
                {
                    name: "South City Hospital",
                    location: "Clifton, Karachi",
                    timings: "Tue - Thu: 6:00 PM - 9:00 PM"
                }
            ],
            whatsapp: "+923001234567",
            email: "info@drjunaidarain.com",
            socials: {
                facebook: "#",
                linkedin: "#",
                instagram: "#"
            }
        };

        const REVIEWS = [
            {
                name: "Ahmed Khan",
                rating: 5,
                text: "Dr. Junaid is highly professional. My knee replacement surgery was a success and I'm walking again without pain.",
                date: "2 months ago"
            },
            {
                name: "Saira Bano",
                rating: 5,
                text: "Best orthopedic surgeon in Karachi. Very patient and explains everything clearly.",
                date: "1 month ago"
            },
            {
                name: "Mustafa Ali",
                rating: 5,
                text: "Great experience at South City. The doctor's diagnosis was spot on.",
                date: "3 weeks ago"
            }
        ];

        // --- Utils ---
        function cn(...inputs) {
            return inputs.filter(Boolean).join(' ');
        }

        // --- Components ---

        const TypingIndicator = () => (
            <div className="flex gap-1 items-center py-1 px-2">
                {[0, 1, 2].map((i) => (
                    <div
                        key={i}
                        className="w-1.5 h-1.5 bg-blue-400 rounded-full animate-pulse"
                        style={{ animationDelay: `${i * 0.2}s` }}
                    />
                ))}
            </div>
        );

        const Navbar = ({ onBookClick }) => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Home', href: '#home' },
                { name: 'Specialties', href: '#specialties' },
                { name: 'Symptom Checker', href: '#symptom-checker' },
                { name: 'Hospitals', href: '#hospitals' },
                { name: 'Reviews', href: '#reviews' },
            ];

            return (
                <nav className={cn(
                    "fixed top-0 left-0 right-0 z-50 transition-all duration-300 px-6 py-4",
                    isScrolled ? "bg-white/90 backdrop-blur-md shadow-sm py-3" : "bg-transparent"
                )}>
                    <div className="max-w-7xl mx-auto flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                                JA
                            </div>
                            <div className="flex flex-col">
                                <span className={cn("font-bold text-lg leading-tight", isScrolled ? "text-slate-900" : "text-white")}>
                                    {DR_INFO.name}
                                </span>
                                <span className={cn("text-xs font-medium opacity-80", isScrolled ? "text-slate-600" : "text-slate-100")}>
                                    Orthopedic Surgeon
                                </span>
                            </div>
                        </div>

                        <div className="hidden md:flex items-center gap-8">
                            {navLinks.map((link) => (
                                <a
                                    key={link.name}
                                    href={link.href}
                                    className={cn(
                                        "text-sm font-medium transition-colors hover:text-blue-500",
                                        isScrolled ? "text-slate-600" : "text-slate-100"
                                    )}
                                >
                                    {link.name}
                                </a>
                            ))}
                            <div className="flex items-center gap-3">
                                <button
                                    onClick={onBookClick}
                                    className={cn(
                                        "px-5 py-2 rounded-full text-sm font-bold transition-all hover:scale-105",
                                        isScrolled ? "bg-blue-600 text-white shadow-lg shadow-blue-600/20" : "bg-white/10 text-white backdrop-blur-md border border-white/20 hover:bg-white/20"
                                    )}
                                >
                                    Book Now
                                </button>
                                <a
                                    href={`https://wa.me/${DR_INFO.whatsapp}`}
                                    target="_blank"
                                    className="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2 shadow-lg"
                                >
                                    WhatsApp
                                </a>
                            </div>
                        </div>

                        <button 
                            className="md:hidden"
                            onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                        >
                            <i data-lucide={isMobileMenuOpen ? "x" : "menu"} className={isScrolled ? "text-slate-900" : "text-white"}></i>
                        </button>
                    </div>

                    {isMobileMenuOpen && (
                        <div className="md:hidden absolute top-full left-0 right-0 bg-white border-t border-slate-100 shadow-xl p-6 flex flex-col gap-4">
                            {navLinks.map((link) => (
                                <a
                                    key={link.name}
                                    href={link.href}
                                    className="text-slate-600 font-medium py-2 border-b border-slate-50"
                                    onClick={() => setIsMobileMenuOpen(false)}
                                >
                                    {link.name}
                                </a>
                            ))}
                            <button
                                onClick={() => { onBookClick(); setIsMobileMenuOpen(false); }}
                                className="bg-blue-600 text-white p-4 rounded-xl font-bold"
                            >
                                Book Appointment
                            </button>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = ({ onBookClick }) => (
            <section id="home" className="relative min-h-screen flex items-center pt-20 overflow-hidden">
                <div className="absolute inset-0 z-0">
                    <img 
                        src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&q=80&w=2000" 
                        alt="Medical Background"
                        className="w-full h-full object-cover"
                    />
                    <div className="absolute inset-0 bg-gradient-to-r from-slate-900/90 via-slate-900/70 to-transparent"></div>
                </div>

                <div className="relative z-10 max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center">
                    <div>
                        <div className="inline-flex items-center gap-2 bg-blue-500/20 backdrop-blur-md border border-blue-500/30 text-blue-400 px-4 py-1.5 rounded-full text-sm font-bold mb-6">
                            PMDC Verified Specialist
                        </div>
                        <h1 className="text-5xl lg:text-7xl font-bold text-white leading-[1.1] mb-6">
                            Restoring Your <span className="text-blue-500">Mobility</span>, <br />
                            Relieving Your <span className="text-blue-500">Pain</span>.
                        </h1>
                        <p className="text-xl text-slate-300 mb-8 max-w-lg leading-relaxed">
                            {DR_INFO.title} specializing in advanced joint replacement, sports injuries, and complex trauma care in Karachi.
                        </p>
                        <div className="flex flex-wrap gap-4 mb-10">
                            <button 
                                onClick={onBookClick}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-full font-bold text-lg shadow-xl shadow-blue-600/20 transition-all hover:scale-105"
                            >
                                Book Appointment
                            </button>
                            <a 
                                href="#symptom-checker"
                                className="bg-white/10 hover:bg-white/20 backdrop-blur-md text-white border border-white/20 px-8 py-4 rounded-full font-bold text-lg transition-all"
                            >
                                AI Symptom Checker
                            </a>
                        </div>
                    </div>

                    <div className="hidden lg:block relative">
                        <div className="absolute -left-12 top-1/4 bg-white p-6 rounded-2xl shadow-2xl z-20 max-w-[240px] animate-bounce-slow">
                            <div className="flex items-center gap-4 mb-3">
                                <div className="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600 font-bold">✓</div>
                                <div>
                                    <div className="text-2xl font-bold text-slate-900">98%</div>
                                    <div className="text-xs text-slate-500 font-medium uppercase tracking-wider">Success Rate</div>
                                </div>
                            </div>
                            <p className="text-sm text-slate-600">In joint replacement and complex orthopedic surgeries.</p>
                        </div>
                        <div className="relative rounded-3xl overflow-hidden border-8 border-white/10 shadow-2xl">
                            <img 
                                src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&q=80&w=800" 
                                alt="Dr. Junaid Sawer Arain"
                                className="w-full h-auto grayscale-[0.2] hover:grayscale-0 transition-all duration-700"
                            />
                        </div>
                    </div>
                </div>
                <div className="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-white to-transparent z-10"></div>
            </section>
        );

        const Specialties = () => (
            <section id="specialties" className="py-24 bg-white">
                <div className="max-w-7xl mx-auto px-6">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl font-bold text-slate-900 mb-4">Expert Orthopedic Care</h2>
                        <p className="text-lg text-slate-600 max-w-2xl mx-auto">
                            Dr. Junaid Sawer Arain provides comprehensive surgical and non-surgical treatments for all musculoskeletal conditions.
                        </p>
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {DR_INFO.specialties.map((spec, idx) => (
                            <div key={spec} className="p-8 rounded-3xl bg-slate-50 border border-slate-100 hover:bg-white hover:shadow-2xl transition-all group">
                                <div className="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors font-bold text-xl">
                                    {idx + 1}
                                </div>
                                <h3 className="text-xl font-bold text-slate-900 mb-3">{spec}</h3>
                                <p className="text-slate-600 text-sm leading-relaxed">
                                    Advanced treatment options using the latest surgical techniques and minimally invasive procedures for faster recovery.
                                </p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const SymptomChecker = () => {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isLoading]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;
                if (!apiKey) {
                    alert("Please set your Gemini API Key first.");
                    return;
                }

                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsLoading(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `System: You are an AI Symptom Checker for Dr. Junaid Sawer Arain. Be professional, empathetic, and always include a disclaimer. User: ${userMsg}` }] }]
                        })
                    });
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: 'ai', content: aiText }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', content: "Error connecting to AI service. Please check your API key." }]);
                }
                setIsLoading(false);
            };

            return (
                <section id="symptom-checker" className="py-24 bg-slate-50">
                    <div className="max-w-4xl mx-auto px-6">
                        <div className="text-center mb-12">
                            <h2 className="text-4xl font-bold text-slate-900 mb-4">AI Orthopedic Symptom Checker</h2>
                            <p className="text-lg text-slate-600">Describe your joint or bone pain for a preliminary assessment.</p>
                            <button 
                                onClick={() => {
                                    const key = prompt("Enter Gemini API Key:", apiKey);
                                    if (key) { setApiKey(key); localStorage.setItem('gemini_api_key', key); }
                                }}
                                className="mt-4 text-xs text-blue-600 font-bold underline"
                            >
                                {apiKey ? "Update API Key" : "Set API Key to Enable AI"}
                            </button>
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden flex flex-col h-[500px]">
                            <div className="bg-slate-900 p-4 text-white font-bold">Orthopedic Assistant</div>
                            <div ref={scrollRef} className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={cn("flex flex-col max-w-[85%]", msg.role === 'user' ? "ml-auto items-end" : "items-start")}>
                                        <div className={cn("p-4 rounded-2xl text-sm shadow-sm", msg.role === 'user' ? "bg-blue-600 text-white" : "bg-white text-slate-700 border border-slate-200")}>
                                            {msg.content}
                                        </div>
                                    </div>
                                ))}
                                {isLoading && <TypingIndicator />}
                            </div>
                            <form onSubmit={handleSubmit} className="p-4 bg-white border-t flex gap-2">
                                <input 
                                    type="text" 
                                    value={input} 
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="Describe symptoms..." 
                                    className="flex-1 bg-slate-100 rounded-xl px-4 py-2 outline-none"
                                />
                                <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Send</button>
                            </form>
                        </div>
                    </div>
                </section>
            );
        };

        const Hospitals = () => (
            <section id="hospitals" className="py-24 bg-slate-900 text-white">
                <div className="max-w-7xl mx-auto px-6">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl font-bold mb-4">Clinic Locations & Timings</h2>
                        <p className="text-slate-400">Dr. Junaid is affiliated with Karachi's premier healthcare institutions.</p>
                    </div>
                    <div className="grid md:grid-cols-2 gap-12">
                        {DR_INFO.hospitals.map((hospital) => (
                            <div key={hospital.name} className="bg-white/5 border border-white/10 p-8 rounded-3xl hover:bg-white/10 transition-all">
                                <h3 className="text-2xl font-bold mb-2 text-blue-400">{hospital.name}</h3>
                                <p className="text-slate-400 mb-6">{hospital.location}</p>
                                <div className="bg-white/5 rounded-2xl p-4">
                                    <div className="text-xs text-slate-500 font-bold uppercase tracking-widest">Consultation Hours</div>
                                    <div className="text-sm font-medium">{hospital.timings}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const Reviews = () => (
            <section id="reviews" className="py-24 bg-white">
                <div className="max-w-7xl mx-auto px-6 text-center">
                    <h2 className="text-4xl font-bold text-slate-900 mb-16">Patient Experiences</h2>
                    <div className="grid md:grid-cols-3 gap-8">
                        {REVIEWS.map((review, idx) => (
                            <div key={idx} className="p-8 rounded-3xl bg-slate-50 border border-slate-100 text-left">
                                <div className="text-yellow-400 mb-4">★★★★★</div>
                                <p className="text-slate-700 italic mb-6">"{review.text}"</p>
                                <div className="font-bold text-slate-900">{review.name}</div>
                                <div className="text-xs text-slate-500">{review.date}</div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const BookingModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl">
                        <div className="bg-blue-600 p-6 text-white flex justify-between items-center">
                            <h3 className="text-2xl font-bold">Book Appointment</h3>
                            <button onClick={onClose} className="text-2xl">×</button>
                        </div>
                        <form className="p-8 space-y-4" onSubmit={(e) => { e.preventDefault(); alert("Request Sent!"); onClose(); }}>
                            <input required type="text" placeholder="Full Name" className="w-full p-3 bg-slate-50 border rounded-xl outline-none" />
                            <input required type="tel" placeholder="Phone Number" className="w-full p-3 bg-slate-50 border rounded-xl outline-none" />
                            <input required type="email" placeholder="Email" className="w-full p-3 bg-slate-50 border rounded-xl outline-none" />
                            <div className="grid grid-cols-2 gap-4">
                                <input required type="date" className="w-full p-3 bg-slate-50 border rounded-xl outline-none" />
                                <select className="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                                    <option>Morning</option>
                                    <option>Afternoon</option>
                                    <option>Evening</option>
                                </select>
                            </div>
                            <textarea placeholder="Reason for visit" className="w-full p-3 bg-slate-50 border rounded-xl outline-none h-24 resize-none"></textarea>
                            <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg">Request Appointment</button>
                        </form>
                    </div>
                </div>
            );
        };

        const Chatbot = ({ onBookClick }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([{ role: 'ai', content: "Hello! I'm Ayesha. How can I help you?" }]);
            const [input, setInput] = useState('');
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || !apiKey) return;
                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `System: You are Ayesha, Dr. Junaid's receptionist. User: ${userMsg}` }] }]
                        })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'ai', content: data.candidates[0].content.parts[0].text }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'ai', content: "Error. Check API Key." }]);
                }
            };

            return (
                <>
                    <button onClick={() => setIsOpen(true)} className={cn("fixed bottom-6 right-6 z-50 w-16 h-16 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center transition-all", isOpen && "hidden")}>
                        💬
                    </button>
                    {isOpen && (
                        <div className="fixed bottom-6 right-6 z-50 w-[350px] h-[500px] bg-white rounded-3xl shadow-2xl border flex flex-col overflow-hidden">
                            <div className="bg-blue-600 p-4 text-white flex justify-between items-center font-bold">
                                <span>Ayesha (AI)</span>
                                <button onClick={() => setIsOpen(false)}>×</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
                                {messages.map((msg, i) => (
                                    <div key={i} className={cn("p-3 rounded-2xl text-sm", msg.role === 'user' ? "bg-blue-600 text-white ml-auto" : "bg-white border mr-auto")}>
                                        {msg.content}
                                    </div>
                                ))}
                            </div>
                            <div className="p-2 flex flex-wrap gap-2 bg-white border-t">
                                <button onClick={() => { onBookClick(); setIsOpen(false); }} className="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-full font-bold">📅 Book Now</button>
                            </div>
                            <form onSubmit={handleSend} className="p-3 border-t flex gap-2">
                                <input value={input} onChange={e => setInput(e.target.value)} placeholder="Type..." className="flex-1 bg-slate-100 px-3 py-1 rounded-lg outline-none text-sm" />
                                <button className="text-blue-600 font-bold">➤</button>
                            </form>
                        </div>
                    )}
                </>
            );
        };

        const Footer = () => (
            <footer className="bg-slate-950 text-white py-12 text-center">
                <div className="max-w-7xl mx-auto px-6">
                    <div className="text-2xl font-bold mb-4">{DR_INFO.name}</div>
                    <p className="text-slate-500 mb-8 max-w-md mx-auto">Dedicated to providing world-class orthopedic care in Karachi.</p>
                    <div className="pt-8 border-t border-white/5 text-slate-600 text-sm">
                        © {new Date().getFullYear()} {DR_INFO.name}. PMDC: 12345-S
                    </div>
                </div>
            </footer>
        );

        // --- Main App ---
        const App = () => {
            const [isBookingOpen, setIsBookingOpen] = useState(false);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen">
                    <Navbar onBookClick={() => setIsBookingOpen(true)} />
                    <Hero onBookClick={() => setIsBookingOpen(true)} />
                    <Specialties />
                    <SymptomChecker />
                    <Hospitals />
                    <Reviews />
                    <Footer />
                    <Chatbot onBookClick={() => setIsBookingOpen(true)} />
                    <BookingModal isOpen={isBookingOpen} onClose={() => setIsBookingOpen(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
